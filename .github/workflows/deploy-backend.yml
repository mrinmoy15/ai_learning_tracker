name: Deploy backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

env:
  PROJECT_ID:   ${{ secrets.GCP_PROJECT_ID }}
  REGION:       us-central1
  SERVICE:      ai-learning-tracker-api
  REGISTRY:     us-central1-docker.pkg.dev
  REPO:         ai-learning-tracker

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write         # needed for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account:            ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build & push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t "$IMAGE" ./backend
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-secrets="DATABASE_URL=tracker-db-url:latest,\
              GOOGLE_CLIENT_ID=tracker-google-client-id:latest,\
              GOOGLE_CLIENT_SECRET=tracker-google-client-secret:latest,\
              JWT_SECRET=tracker-jwt-secret:latest" \
            --set-env-vars="OAUTH_REDIRECT_URI=https://${{ env.SERVICE }}-${{ secrets.CLOUD_RUN_HASH }}-uc.a.run.app/auth/callback,\
              ALLOWED_ORIGINS=[\"https://${{ secrets.GH_PAGES_URL }}\"]" \
            --min-instances 0 \
            --max-instances 5 \
            --memory 512Mi \
            --cpu 1
